<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urenregistratie 80 Uur - v3.0</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .content { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        @media (max-width: 1024px) { .content { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 768px) { .content { grid-template-columns: 1fr; } }
        .card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .card h2 { color: #667eea; margin-bottom: 20px; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
        .timer-display { font-size: 3em; font-weight: bold; text-align: center; color: #667eea; margin: 20px 0; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 1em; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-success { background: #48bb78; color: white; }
        .btn-danger { background: #f56565; color: white; }
        .btn-primary { background: #667eea; color: white; }
        .btn-secondary { background: #718096; color: white; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #e2e8f0; border-radius: 8px; }
        label { display: block; margin-bottom: 5px; color: #2d3748; font-weight: 600; }
        .full-width { grid-column: 1 / -1; }
        .goal-box { grid-column: 1 / -1; background: white; border-radius: 15px; padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); margin: 20px 0; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 20px 0; }
        .stat { text-align: center; padding: 20px; background: #f7fafc; border-radius: 8px; }
        .stat-label { color: #718096; font-size: 0.9em; }
        .stat-value { font-size: 2.5em; font-weight: bold; color: #667eea; }
        .progress-bar { width: 100%; height: 40px; background: #e2e8f0; border-radius: 20px; overflow: hidden; margin: 15px 0; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #48bb78, #38a169); width: 0%; }
        .entry { background: #f7fafc; border-left: 4px solid #667eea; padding: 15px; margin: 15px 0; border-radius: 8px; display: flex; justify-content: space-between; }
        .message { padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .message.success { background: #c6f6d5; color: #22543d; }
        .message.error { background: #fed7d7; color: #742a2a; }
        .main-card { max-width: 640px; margin: 0 auto 24px; }
        .time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .duration-box { background: #f7fafc; padding: 18px; border-radius: 10px; text-align: center; font-size: 1.25em; font-weight: 600; color: #667eea; margin: 14px 0 22px; border: 1px solid #e2e8f0; }
        .duration-box.error { color: #c53030; background: #fff5f5; border-color: #fed7d7; }
        .grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .grid-2col { grid-template-columns: 1fr; } }
        .onboarding-tip { background: rgba(255,255,255,0.18); color: white; padding: 14px 20px; border-radius: 12px; margin: 0 auto 22px; max-width: 640px; text-align: center; font-size: 0.95em; line-height: 1.45; }
        .danger-link { display: inline-block; margin-top: 14px; color: #e53e3e; font-size: 0.9em; text-decoration: underline; cursor: pointer; background: none; border: none; width: auto; padding: 4px 8px; font-weight: normal; }
        .danger-link:hover { color: #c53030; }
        textarea#notesInput { min-height: 80px; resize: vertical; }
        input, textarea, select, button { font-size: 16px; }
        input[type="date"], input[type="time"] { -webkit-appearance: none; appearance: none; background: white; color: #2d3748; font-family: inherit; min-height: 44px; }
        input[type="date"]::-webkit-date-and-time-value, input[type="time"]::-webkit-date-and-time-value { text-align: left; }
        input[type="time"]::-webkit-date-and-time-value { text-align: center; }
        @media (max-width: 600px) {
            body { padding: 8px; }
            .header { margin-bottom: 18px; }
            .header h1 { font-size: 1.65em; line-height: 1.15; }
            .header p { font-size: 0.9em; }
            .card { padding: 14px; border-radius: 12px; }
            .card h2 { font-size: 1.1em; margin-bottom: 14px; padding-bottom: 8px; }
            .main-card { padding: 14px; margin-bottom: 16px; }
            .goal-box { padding: 14px; margin: 16px 0; }
            .stats { grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 14px 0; }
            .stat { padding: 10px 6px; }
            .stat-label { font-size: 0.75em; }
            .stat-value { font-size: 1.5em; }
            .duration-box { font-size: 1.05em; padding: 14px; margin: 12px 0 16px; }
            .progress-bar { height: 28px; }
            .entry { padding: 12px; gap: 8px; align-items: center; }
            .entry-info { min-width: 0; flex: 1; }
            .entry button.btn-danger { width: 44px !important; padding: 8px !important; flex-shrink: 0; margin: 0 !important; }
            .onboarding-tip { font-size: 0.9em; padding: 12px 14px; margin-bottom: 16px; }
            .grid-2col { gap: 14px; }
            input, textarea { padding: 9px 10px; box-sizing: border-box; max-width: 100%; min-width: 0; }
            input[type="date"] { padding: 8px 6px; display: block; width: 100%; box-sizing: border-box; }
            input[type="time"] { padding: 8px 4px; text-align: center; width: 100%; box-sizing: border-box; }
            .time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
            .time-row > div { min-width: 0; }
            .time-row > div > input { width: 100%; min-width: 0; }
        }
        @media (max-width: 380px) {
            body { padding: 6px; }
            .card, .main-card, .goal-box { padding: 12px; }
            .time-row { gap: 6px; }
            input[type="time"] { padding: 8px 2px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>&#x23F1;&#xFE0F; Urenregistratie</h1><p>Werktijden bijhouden</p></div>
        <div id="onboardingTip"></div>
        <div class="card main-card">
            <h2>Werktijd toevoegen</h2>
            <label>Datum</label>
            <input type="date" id="dateInput">
            <div class="time-row">
                <div><label>Starttijd</label><input type="time" id="startTimeInput" oninput="window.updateDuration()"></div>
                <div><label>Stoptijd</label><input type="time" id="stopTimeInput" oninput="window.updateDuration()"></div>
            </div>
            <div class="duration-box" id="durationDisplay">Duur: &mdash;</div>
            <label>Websites</label>
            <input type="text" id="websitesInput" placeholder="Figma, Notion...">
            <label>Aantekeningen</label>
            <textarea id="notesInput" rows="3" placeholder="Wat heb je gedaan?"></textarea>
            <button class="btn-success" onclick="window.addEntry()">Uren toevoegen</button>
        </div>
        <div class="goal-box">
            <h2>&#x1F3AF; 80 Uur Doelstelling</h2>
            <div class="stats">
                <div class="stat"><div class="stat-label">Besteed</div><div class="stat-value" id="spentValue">0.0</div><div class="stat-label">uur</div></div>
                <div class="stat"><div class="stat-label">Nog te gaan</div><div class="stat-value" id="remainingValue">80.0</div><div class="stat-label">uur</div></div>
                <div class="stat"><div class="stat-label">Voortgang</div><div class="stat-value" id="percentValue">0%</div><div class="stat-label">voltooid</div></div>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="progress-text" id="progressText">0.0 / 80 uur</div>
        </div>
        <div style="margin-top:20px;">
            <div class="card">
                <h2>Opgeslagen Entries</h2>
                <div id="messageBox"></div>
                <div id="entriesList"></div>
            </div>
        </div>
        <div class="grid-2col" style="margin-top:20px;">
            <div class="card">
                <h2>&#x1F4DA; Bronnen</h2>
                <label>Titel</label>
                <input type="text" id="sourceTitleInput" placeholder="Figma">
                <label>URL</label>
                <input type="text" id="sourceUrlInput" placeholder="https://...">
                <button class="btn-primary" onclick="window.addSource()">Bron toevoegen</button>
                <hr style="margin:20px 0;border:none;border-top:1px solid #e2e8f0;">
                <div id="sourcesList"></div>
            </div>
            <div class="card" style="text-align:center;">
                <h2>Exporteren</h2>
                <button class="btn-primary" onclick="window.downloadExcel()">&#x1F4CA; Download Excel</button>
                <button type="button" class="danger-link" onclick="window.clearAll()">&#x1F5D1;&#xFE0F; Alles verwijderen</button>
            </div>
        </div>
    </div>
    <script>
        let entries = [];
        let sources = [];
        const GOAL = 80;
        window.addEventListener('load', function() { document.getElementById('dateInput').valueAsDate = new Date(); loadData(); updateUI(); });
        function timeDiffMinutes(start, stop) { const sp = start.split(':').map(Number); const ep = stop.split(':').map(Number); const startMin = sp[0]*60 + sp[1]; const stopMin = ep[0]*60 + ep[1]; if (stopMin <= startMin) return null; return stopMin - startMin; }
        window.updateDuration = function() { const start = document.getElementById('startTimeInput').value; const stop = document.getElementById('stopTimeInput').value; const disp = document.getElementById('durationDisplay'); disp.classList.remove('error'); if (!start || !stop) { disp.innerHTML = 'Duur: &mdash;'; return; } const mins = timeDiffMinutes(start, stop); if (mins === null) { disp.classList.add('error'); disp.textContent = '\u26A0 Stoptijd is v\u00F3\u00F3r starttijd'; return; } const h = Math.floor(mins / 60); const m = mins % 60; const decimal = (mins/60).toFixed(2).replace('.', ','); disp.textContent = 'Duur: ' + h + ' uur ' + m + ' min (' + decimal + ' uur)'; };
        window.addEntry = function() { const date = document.getElementById('dateInput').value; const start = document.getElementById('startTimeInput').value; const stop = document.getElementById('stopTimeInput').value; const websites = document.getElementById('websitesInput').value; const notes = document.getElementById('notesInput').value; if (!date) { showMessage('Voer datum in', 'error'); return; } if (!start || !stop) { showMessage('Vul start- en stoptijd in', 'error'); return; } const mins = timeDiffMinutes(start, stop); if (mins === null) { showMessage('Stoptijd moet na starttijd liggen', 'error'); return; } const hours = parseFloat((mins / 60).toFixed(2)); entries.push({ date, hours, websites, notes }); saveData(); updateUI(); document.getElementById('startTimeInput').value = ''; document.getElementById('stopTimeInput').value = ''; document.getElementById('websitesInput').value = ''; document.getElementById('notesInput').value = ''; const dispEl = document.getElementById('durationDisplay'); dispEl.classList.remove('error'); dispEl.innerHTML = 'Duur: &mdash;'; const total = entries.reduce((s, e) => s + e.hours, 0); const remaining = Math.max(0, GOAL - total); showMessage('\u2705 ' + hours.toFixed(2).replace('.', ',') + ' uur opgeslagen \u2014 nog ' + remaining.toFixed(1).replace('.', ',') + ' uur te gaan!', 'success'); };
        window.deleteEntry = function(index) { if (confirm('Verwijderen?')) { entries.splice(index, 1); saveData(); updateUI(); } };
        window.addSource = function() { const title = document.getElementById('sourceTitleInput').value; const url = document.getElementById('sourceUrlInput').value; if (!title || !url) { showMessage('Titel en URL nodig', 'error'); return; } sources.push({ title, url }); saveData(); updateUI(); document.getElementById('sourceTitleInput').value = ''; document.getElementById('sourceUrlInput').value = ''; showMessage('Opgeslagen!', 'success'); };
        window.deleteSource = function(index) { if (confirm('Verwijderen?')) { sources.splice(index, 1); saveData(); updateUI(); } };
        function updateUI() { const tip = document.getElementById('onboardingTip'); if (tip) { tip.innerHTML = entries.length ? '' : '<div class="onboarding-tip">\u{1F44B} Welkom! Vul je <b>start- en stoptijd</b> in, klik op <b>Uren toevoegen</b>, en je voortgang verschijnt hieronder.</div>'; } let html = entries.length ? entries.map((e, i) => '<div class="entry"><div class="entry-info"><div class="entry-date">' + new Date(e.date).toLocaleDateString('nl-NL', {weekday:'short',year:'numeric',month:'short',day:'numeric'}) + '</div><div class="entry-time">\u23F1\uFE0F ' + e.hours.toFixed(2).replace('.', ',') + ' uur</div>' + (e.websites ? '<div>\u{1F4BB} ' + e.websites + '</div>' : '') + (e.notes ? '<div style="color:#718096;font-style:italic;">\u{1F4DD} ' + e.notes + '</div>' : '') + '</div><button class="btn-danger" style="width:50px; margin:0; flex-shrink:0;" onclick="window.deleteEntry(' + i + ')">\u2715</button></div>').join('') : '<div class="empty">Nog geen uren opgeslagen.</div>'; document.getElementById('entriesList').innerHTML = html; html = sources.length ? sources.map((s, i) => '<div style="background:#edf2f7;padding:12px;margin:8px 0;border-radius:6px;display:flex;justify-content:space-between;"><a href="' + s.url + '" target="_blank" style="color:#667eea;text-decoration:none;flex:1;">\u{1F517} ' + s.title + '</a><button class="btn-danger" style="width:50px;margin:0;" onclick="window.deleteSource(' + i + ')">\u2715</button></div>').join('') : '<div class="empty">Nog geen bronnen.</div>'; document.getElementById('sourcesList').innerHTML = html; const total = entries.reduce((sum, e) => sum + e.hours, 0); const remaining = Math.max(0, GOAL - total); const percent = total >= GOAL ? 100 : Math.round((total / GOAL) * 100); document.getElementById('spentValue').textContent = total.toFixed(1); document.getElementById('remainingValue').textContent = remaining.toFixed(1); document.getElementById('percentValue').textContent = percent + '%'; document.getElementById('progressText').textContent = total.toFixed(1) + ' / ' + GOAL + ' uur'; document.getElementById('progressFill').style.width = percent + '%'; }
        function buildStyledSheet(headers, rows, widths, boldLastRow, numFmts) {
            const aoa = [headers].concat(rows);
            const ws = XLSX.utils.aoa_to_sheet(aoa);
            ws['!cols'] = widths.map(w => ({ wch: w }));
            ws['!rows'] = [{ hpt: 24 }];
            const thin = { style: 'thin', color: { rgb: '8896C0' } };
            const border = { top: thin, bottom: thin, left: thin, right: thin };
            const nRows = aoa.length, nCols = headers.length;
            const lastRow = nRows - 1;
            for (let r = 0; r < nRows; r++) {
                for (let c = 0; c < nCols; c++) {
                    const addr = XLSX.utils.encode_cell({ r, c });
                    if (!ws[addr]) ws[addr] = { t: 's', v: '' };
                    const s = { border, alignment: { vertical: 'center' } };
                    if (r === 0) {
                        s.font = { bold: true, sz: 12, color: { rgb: 'FFFFFF' } };
                        s.fill = { patternType: 'solid', fgColor: { rgb: '667EEA' } };
                        s.alignment = { horizontal: 'center', vertical: 'center' };
                    } else if (boldLastRow && r === lastRow) {
                        s.font = { bold: true };
                        s.fill = { patternType: 'solid', fgColor: { rgb: 'E2E8F0' } };
                    }
                    if (r > 0 && numFmts && numFmts[c]) { s.numFmt = numFmts[c]; ws[addr].z = numFmts[c]; }
                    ws[addr].s = s;
                }
            }
            return ws;
        }
        window.downloadExcel = function() { if (!entries.length) { showMessage('Geen entries om te downloaden', 'error'); return; } if (typeof XLSX === 'undefined') { showMessage('Excel-bibliotheek nog niet geladen, probeer zo nog eens', 'error'); return; } const wb = XLSX.utils.book_new(); const total = entries.reduce((s, e) => s + e.hours, 0); const urenRows = entries.map(e => [new Date(e.date).toLocaleDateString('nl-NL'), e.hours, e.websites || '', e.notes || '']); urenRows.push(['TOTAAL', total, '', '']); const ws1 = buildStyledSheet(['Datum', 'Uren', 'Websites', 'Aantekeningen'], urenRows, [16, 10, 25, 40], true, ['', '0.00', '', '']); XLSX.utils.book_append_sheet(wb, ws1, 'Urenregistratie'); const bronRows = sources.map(s => [s.title, s.url]); if (!bronRows.length) bronRows.push(['(geen bronnen)', '']); const ws2 = buildStyledSheet(['Titel', 'URL'], bronRows, [30, 55], false); XLSX.utils.book_append_sheet(wb, ws2, 'Bronnen'); XLSX.writeFile(wb, 'urenregistratie_' + new Date().toISOString().split('T')[0] + '.xlsx'); showMessage('\u2705 Excel gedownload!', 'success'); };
        window.clearAll = function() { if (confirm('ALLES verwijderen?')) { entries = []; sources = []; saveData(); updateUI(); showMessage('Verwijderd', 'success'); } };
        function saveData() { localStorage.setItem('entries', JSON.stringify(entries)); localStorage.setItem('sources', JSON.stringify(sources)); }
        function loadData() { entries = JSON.parse(localStorage.getItem('entries') || '[]'); sources = JSON.parse(localStorage.getItem('sources') || '[]'); }
        function showMessage(text, type) { const box = document.getElementById('messageBox'); const msg = document.createElement('div'); msg.className = 'message ' + type; msg.textContent = text; box.innerHTML = ''; box.appendChild(msg); setTimeout(() => msg.remove(), 3000); }
    </script>
</body>
</html>
